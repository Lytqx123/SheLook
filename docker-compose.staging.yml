# SheLook Staging 覆盖配置
# 用法: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# 和 production 的区别：
#   不限制资源（方便压测看上限）
#   暴露 backend/frontend/Flower/Prometheus/Grafana 端口便于调试

services:
  backend:
    environment:
      APP_ENV: staging
      DEBUG: "false"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./secrets/c2pa-cert.pem:/run/secrets/c2pa-cert.pem:ro
      - ./secrets/c2pa-private-key.pem:/run/secrets/c2pa-private-key.pem:ro

  celery-worker:
    environment:
      APP_ENV: staging
    volumes:
      - ./backend:/app
      - ./secrets/c2pa-cert.pem:/run/secrets/c2pa-cert.pem:ro
      - ./secrets/c2pa-private-key.pem:/run/secrets/c2pa-private-key.pem:ro

  celery-beat:
    environment:
      APP_ENV: staging

  flower:
    ports:
      - "5555:5555"

  frontend:
    environment:
      APP_ENV: staging
    ports:
      - "3000:3000"

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3001:3000"
