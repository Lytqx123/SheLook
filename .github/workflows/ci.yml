name: Continuous Integration

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend quality and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Sync dependencies
        run: uv sync --locked --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest

  migrations:
    name: Database migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg17
        env:
          POSTGRES_USER: shelook
          POSTGRES_PASSWORD: shelook
          POSTGRES_DB: shelook
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shelook -d shelook"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://shelook:shelook@localhost:5432/shelook
      DATABASE_URL_SYNC: postgresql+psycopg2://shelook:shelook@localhost:5432/shelook
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Sync dependencies
        run: uv sync --locked --extra dev
      - name: Apply all migrations
        run: uv run alembic upgrade head
      - name: Verify tenant isolation and release-control baseline
        run: uv run python -m scripts.phase6.verify_data_integrity --output /tmp/phase6-integrity.json

  frontend:
    name: Frontend quality and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
