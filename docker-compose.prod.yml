# ============================================================
# SheLook Production 环境覆盖配置
#
# 使用: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 与 staging 的差异:
#   - 不暴露后端/Flower 端口到宿主机
#   - 限制资源上限
#   - 生产级别的健康检查间隔
# ============================================================

services:
  backend:
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: WARNING
    # 生产环境不暴露 8000 端口，仅通过 nginx 代理访问
    ports: !reset []
    volumes:
      - ./backend:/app
      - ./secrets/c2pa-cert.pem:/run/secrets/c2pa-cert.pem:ro
      - ./secrets/c2pa-private-key.pem:/run/secrets/c2pa-private-key.pem:ro
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  celery-worker:
    environment:
      APP_ENV: production
    volumes:
      - ./backend:/app
      - ./secrets/c2pa-cert.pem:/run/secrets/c2pa-cert.pem:ro
      - ./secrets/c2pa-private-key.pem:/run/secrets/c2pa-private-key.pem:ro
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

  celery-beat:
    environment:
      APP_ENV: production

  flower:
    # 生产环境不暴露 Flower 端口
    ports: !reset []

  frontend:
    environment:
      APP_ENV: production
    ports: !reset []

  prometheus:
    deploy:
      resources:
        limits:
          memory: 1G

  grafana:
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    deploy:
      resources:
        limits:
          memory: 256M
