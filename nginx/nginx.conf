# SheLook Nginx 反向代理
#
# 路由：
#   /          → 前端 Next.js
#   /api/      → 后端 FastAPI
#   /api/*/ws/ → WebSocket（生图进度）
#   /docs, /openapi.json → Swagger
#   /images/   → MinIO（带长缓存）
#   /flower/   → Celery 监控
#   /grafana/  → Grafana

# ---- Gzip 压缩 ----
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml;

server {
    listen 80;
    server_name localhost;

    # Optional public-preview access gate.  The directory is deliberately
    # empty in local development; a host that binds Nginx publicly supplies an
    # untracked *.conf file in it before exposing port 80.
    include /etc/nginx/external-access/*.conf;

    # Docker 服务重建后容器 IP 会变化；通过内置 DNS 动态重新解析上游。
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    set $frontend_upstream frontend:3000;
    set $backend_upstream backend:8000;
    set $minio_upstream minio:9000;
    set $grafana_upstream grafana:3000;

# ---- 安全响应头 ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- 上传限制 ----
    client_max_body_size 20M;

    # ---- 前端 ----
    location / {
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- 后端 REST API ----
    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- WebSocket（生图进度）----
    location /api/generation/ws/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- Swagger ----
    location /docs {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.json {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- MinIO 图片（带长缓存）----
    location /images/ {
        rewrite ^/images/(.*)$ /product-images/$1 break;
        proxy_pass http://$minio_upstream;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Grafana ----
    location /grafana/ {
        # Grafana generates /grafana/ links from GF_SERVER_ROOT_URL.  The
        # upstream itself serves at /, so remove the public prefix here.
        rewrite ^/grafana/(.*)$ /$1 break;
        proxy_pass http://$grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-WEBAUTH-USER $remote_user;
    }
}
