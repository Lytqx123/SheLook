# SheLook 开发环境 Prometheus 配置。
#
# 开发后端在 METRICS_API_KEY 为空时允许内部网络抓取；生产与预发请使用
# prometheus.secure.yml，由 Compose 通过 Docker secret 提供 Bearer 凭据。
global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: shelook-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: shelook-api
