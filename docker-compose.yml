# SheLook development Compose topology
#
# This file is intentionally the local-development baseline:
#   - application source is bind-mounted for backend iteration;
#   - every diagnostic port is bound to loopback only;
#   - HTTP(S) proxy settings are opt-in through the selected env file.
#
# Staging and production must be started with their matching overlay:
#   docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.staging.yml …
#   docker compose --env-file .env.prod    -f docker-compose.yml -f docker-compose.prod.yml …
#
# Database migrations never run in the API container. Run the controlled job:
#   docker compose --profile migration run --rm migrate

name: ${COMPOSE_PROJECT_NAME:-shelook-dev}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# No workstation proxy is baked into the project. Set HTTP_PROXY / HTTPS_PROXY
# in an environment file only when the selected environment needs one.
x-proxy-env: &proxy-env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  http_proxy: ${HTTP_PROXY:-}
  https_proxy: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis,minio,backend,frontend,nginx}
  no_proxy: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis,minio,backend,frontend,nginx}

# Runtime services deliberately receive only DATABASE_URL. DATABASE_MIGRATION_URL
# is added to the migrate service below, so an owner-capable connection cannot
# accidentally reach API or worker containers.
x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-development}
  DEBUG: ${DEBUG:-false}
  APP_VERSION: ${APP_VERSION:-1.1.0}
  APP_REVISION: ${APP_REVISION:-unknown}
  DEPLOYMENT_REGION: ${DEPLOYMENT_REGION:-local}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  API_WORKERS: ${API_WORKERS:-3}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in the selected environment file}
  INTEGRATION_CREDENTIALS_ENCRYPTION_KEY: ${INTEGRATION_CREDENTIALS_ENCRYPTION_KEY:-}

  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-shelook}:${POSTGRES_PASSWORD:-shelook}@postgres:5432/${POSTGRES_DB:-shelook}}
  DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg2://${POSTGRES_USER:-shelook}:${POSTGRES_PASSWORD:-shelook}@postgres:5432/${POSTGRES_DB:-shelook}}
  PGVECTOR_EXTENSION: ${PGVECTOR_EXTENSION:-true}
  DATABASE_ECHO: ${DATABASE_ECHO:-false}
  DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
  DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-0}
  DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-10}
  DATABASE_POOL_RECYCLE_SECONDS: ${DATABASE_POOL_RECYCLE_SECONDS:-900}
  DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-30000}
  DATABASE_LOCK_TIMEOUT_MS: ${DATABASE_LOCK_TIMEOUT_MS:-5000}
  DATABASE_APPLICATION_NAME: ${DATABASE_APPLICATION_NAME:-shelook-api}
  DASHBOARD_SUMMARY_CACHE_TTL_SECONDS: ${DASHBOARD_SUMMARY_CACHE_TTL_SECONDS:-15}
  PRODUCT_LIST_CACHE_TTL_SECONDS: ${PRODUCT_LIST_CACHE_TTL_SECONDS:-10}

  REDIS_PASSWORD: ${REDIS_PASSWORD:-shelook-dev}
  REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-shelook-dev}@redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD:-shelook-dev}@redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:-shelook-dev}@redis:6379/2}
  CELERY_VISIBILITY_TIMEOUT_SECONDS: ${CELERY_VISIBILITY_TIMEOUT_SECONDS:-3600}
  CELERY_RESULT_EXPIRES_SECONDS: ${CELERY_RESULT_EXPIRES_SECONDS:-86400}
  CELERY_ORCHESTRATION_CONCURRENCY: ${CELERY_ORCHESTRATION_CONCURRENCY:-4}
  CELERY_GENERATION_CONCURRENCY: ${CELERY_GENERATION_CONCURRENCY:-2}
  CELERY_ANALYTICS_CONCURRENCY: ${CELERY_ANALYTICS_CONCURRENCY:-2}

  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-shelook}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-shelook123}
  MINIO_BUCKET: ${MINIO_BUCKET:-product-images}
  MINIO_PRIVATE_BUCKET: ${MINIO_PRIVATE_BUCKET:-product-images-private}
  MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://localhost:9000}
  MINIO_REGION: ${MINIO_REGION:-us-east-1}
  MINIO_SECURE: ${MINIO_SECURE:-false}
  MINIO_PRESIGNED_URL_EXPIRY_SECONDS: ${MINIO_PRESIGNED_URL_EXPIRY_SECONDS:-3600}

  IMAGE_FETCH_ALLOWED_HOSTS: '${IMAGE_FETCH_ALLOWED_HOSTS:-["placehold.co","replicate.delivery","pbxt.replicate.delivery","storage.googleapis.com","ai.googleusercontent.com"]}'
  IMAGE_FETCH_TRUSTED_PRIVATE_HOSTS: '${IMAGE_FETCH_TRUSTED_PRIVATE_HOSTS:-[]}'
  IMAGE_FETCH_MAX_BYTES: ${IMAGE_FETCH_MAX_BYTES:-26214400}
  IMAGE_FETCH_TIMEOUT_SECONDS: ${IMAGE_FETCH_TIMEOUT_SECONDS:-30}
  IMAGE_FETCH_MAX_REDIRECTS: ${IMAGE_FETCH_MAX_REDIRECTS:-3}

  REPLICATE_TIMEOUT: ${REPLICATE_TIMEOUT:-180}
  SD_WEBUI_URL: ${SD_WEBUI_URL:-http://sd-webui:7860}
  ALLOW_GENERATION_MOCKS: ${ALLOW_GENERATION_MOCKS:-true}
  GENERATION_BATCH_CONCURRENCY: ${GENERATION_BATCH_CONCURRENCY:-4}
  IMAGE_GENERATION_RESERVATION_CENTS: ${IMAGE_GENERATION_RESERVATION_CENTS:-8}
  VIDEO_GENERATION_RESERVATION_CENTS: ${VIDEO_GENERATION_RESERVATION_CENTS:-30}

  CLIP_MODEL_NAME: ${CLIP_MODEL_NAME:-openai/clip-vit-base-patch32}
  VECTOR_DIMENSION: ${VECTOR_DIMENSION:-512}
  IMAGE_TEXT_MATCH_THRESHOLD: ${IMAGE_TEXT_MATCH_THRESHOLD:-0.25}
  MODEL_DIR: /app/models
  HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
  HF_HUB_ENABLE_HF_TRANSFER: ${HF_HUB_ENABLE_HF_TRANSFER:-0}
  HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}

  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
  RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
  RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-600}
  RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
  TRUSTED_PROXY_HOSTS: ${TRUSTED_PROXY_HOSTS:-127.0.0.1,::1,nginx}

  ENABLE_AUTH: ${ENABLE_AUTH:-false}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
  AUTH_REDIS_SOCKET_CONNECT_TIMEOUT_SECONDS: ${AUTH_REDIS_SOCKET_CONNECT_TIMEOUT_SECONDS:-1}
  AUTH_REDIS_SOCKET_TIMEOUT_SECONDS: ${AUTH_REDIS_SOCKET_TIMEOUT_SECONDS:-1}
  AUTH_REDIS_MAX_CONNECTIONS: ${AUTH_REDIS_MAX_CONNECTIONS:-32}
  AUTH_REDIS_FAILURE_BACKOFF_SECONDS: ${AUTH_REDIS_FAILURE_BACKOFF_SECONDS:-2}
  OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
  OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
  OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
  OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
  OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:3000/login/callback}
  OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
  OIDC_HTTP_TIMEOUT_SECONDS: ${OIDC_HTTP_TIMEOUT_SECONDS:-10}
  OIDC_TENANT_CLAIM: ${OIDC_TENANT_CLAIM:-tenant_id}
  OIDC_TENANT_CLAIM_MAP: '${OIDC_TENANT_CLAIM_MAP:-{}}'
  FEISHU_APP_ID: ${FEISHU_APP_ID:-}
  FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
  FEISHU_REDIRECT_URI: ${FEISHU_REDIRECT_URI:-http://localhost:3000/login/callback}
  FEISHU_SCOPES: ${FEISHU_SCOPES:-auth:user.id:read}
  FEISHU_TENANT_KEY_MAP: '${FEISHU_TENANT_KEY_MAP:-{}}'
  FEISHU_ALLOWED_TENANT_KEYS: '${FEISHU_ALLOWED_TENANT_KEYS:-[]}'
  DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-default}
  TENANT_ENFORCEMENT_ENABLED: ${TENANT_ENFORCEMENT_ENABLED:-true}
  TENANT_RLS_ENABLED: ${TENANT_RLS_ENABLED:-true}

  FALLBACK_CTR: ${FALLBACK_CTR:-0.025}
  FALLBACK_HIT_PROBABILITY: ${FALLBACK_HIT_PROBABILITY:-0.3}
  FAIRNESS_BASELINE_SOURCE: ${FAIRNESS_BASELINE_SOURCE:-operator-configured baseline}
  FAIRNESS_MARKET_BASELINES: '${FAIRNESS_MARKET_BASELINES:-{"us":{"light":0.55,"medium":0.25,"dark":0.15,"no_person":0.05},"eu":{"light":0.65,"medium":0.20,"dark":0.10,"no_person":0.05},"me":{"light":0.30,"medium":0.50,"dark":0.15,"no_person":0.05},"seasia":{"light":0.10,"medium":0.60,"dark":0.25,"no_person":0.05},"default":{"light":0.40,"medium":0.35,"dark":0.20,"no_person":0.05}}}'
  FAIRNESS_DEVIATION_THRESHOLD: ${FAIRNESS_DEVIATION_THRESHOLD:-0.3}
  FAIRNESS_MAX_CLASSIFICATIONS_PER_REQUEST: ${FAIRNESS_MAX_CLASSIFICATIONS_PER_REQUEST:-50}
  DASHBOARD_CTR_BASELINE: ${DASHBOARD_CTR_BASELINE:-0.02}
  EXPERIMENT_COMPLETION_IMPRESSIONS: ${EXPERIMENT_COMPLETION_IMPRESSIONS:-10000}

  METRICS_API_KEY: ${METRICS_API_KEY:-}
  C2PA_ENABLED: ${C2PA_ENABLED:-false}
  C2PA_REQUIRED: ${C2PA_REQUIRED:-false}
  C2PA_CERT_PATH: ${C2PA_CERT_PATH:-}
  C2PA_PRIVATE_KEY_PATH: ${C2PA_PRIVATE_KEY_PATH:-}
  C2PA_SIGNING_ALGORITHM: ${C2PA_SIGNING_ALGORITHM:-ES256}
  C2PA_TIMESTAMP_AUTHORITY_URL: ${C2PA_TIMESTAMP_AUTHORITY_URL:-}

  AMAZON_REPORT_POLL_SECONDS: ${AMAZON_REPORT_POLL_SECONDS:-5}
  AMAZON_REPORT_TIMEOUT_SECONDS: ${AMAZON_REPORT_TIMEOUT_SECONDS:-180}
  AMAZON_SYNC_MAX_DAYS: ${AMAZON_SYNC_MAX_DAYS:-3}

  OTEL_ENABLED: ${OTEL_ENABLED:-false}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-shelook-backend}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

x-runtime-depends: &runtime-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  minio:
    condition: service_healthy

x-backend-image: &backend-image
  image: ${BACKEND_IMAGE:-shelook-backend:local}
  build:
    context: ./backend
    dockerfile: Dockerfile
    args:
      APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
      UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.5.11}
      UV_DEFAULT_INDEX: ${UV_DEFAULT_INDEX:-}

x-frontend-image: &frontend-image
  image: ${FRONTEND_IMAGE:-shelook-frontend:local}
  build:
    context: ./frontend
    dockerfile: Dockerfile

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shelook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shelook}
      POSTGRES_DB: ${POSTGRES_DB:-shelook}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    init: true
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-shelook-dev}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-shelook-dev}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
    restart: unless-stopped
    init: true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-shelook}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-shelook123}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://localhost:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD >/dev/null 2>&1 && mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  pgbouncer:
    image: edoburu/pgbouncer:1.24
    restart: unless-stopped
    init: true
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-shelook}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-shelook}
      DB_NAME: ${POSTGRES_DB:-shelook}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-500}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-25}
      MIN_POOL_SIZE: ${PGBOUNCER_MIN_POOL_SIZE:-5}
      RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-5}
      RESERVE_POOL_TIMEOUT: ${PGBOUNCER_RESERVE_POOL_TIMEOUT:-3}
      SERVER_IDLE_TIMEOUT: ${PGBOUNCER_SERVER_IDLE_TIMEOUT:-60}
      ADMIN_USERS: ${POSTGRES_USER:-shelook}
    ports:
      - "127.0.0.1:${PGBOUNCER_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-shelook}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    profiles: ["pgbouncer"]

  sd-webui:
    image: ghcr.io/abdullahrizwan/stable-diffusion-webui:latest
    restart: unless-stopped
    init: true
    environment:
      COMMANDLINE_ARGS: --api --listen --enable-insecure-extension-access
    ports:
      - "127.0.0.1:${SD_WEBUI_PORT:-7860}:7860"
    volumes:
      - sd_models:/stable-diffusion-webui/models
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7860/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: ["sd-webui"]

  backend:
    <<: *backend-image
    restart: unless-stopped
    init: true
    environment:
      <<: [*backend-env, *proxy-env]
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      <<: *runtime-depends
    volumes:
      - ./backend:/app
      # 开发专用：供 scripts.seed_mock_catalog 读取用户提供的本地模拟素材。
      # 预发布/生产覆盖文件会替换 backend volumes，因此不会挂载该目录。
      - ./mock图片:/mock-assets:ro
      - hf_cache:/home/appuser/.cache/huggingface
      - model_artifacts:/app/models
    command: >-
      sh -c 'exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers=$${API_WORKERS:-3}'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G

  migrate:
    <<: *backend-image
    init: true
    restart: "no"
    environment:
      <<: [*backend-env, *proxy-env]
      DATABASE_MIGRATION_URL: ${DATABASE_MIGRATION_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["alembic", "upgrade", "head"]
    profiles: ["migration"]
    logging: *default-logging

  celery-worker:
    <<: *backend-image
    restart: unless-stopped
    init: true
    environment:
      <<: [*backend-env, *proxy-env]
    depends_on:
      <<: *runtime-depends
    volumes:
      - ./backend:/app
      - hf_cache:/home/appuser/.cache/huggingface
      - model_artifacts:/app/models
    command: celery -A app.tasks worker --loglevel=info --concurrency=${CELERY_ORCHESTRATION_CONCURRENCY:-4} -Q orchestration
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G

  celery-worker-generation:
    <<: *backend-image
    restart: unless-stopped
    init: true
    environment:
      <<: [*backend-env, *proxy-env]
    depends_on:
      <<: *runtime-depends
    volumes:
      - ./backend:/app
      - hf_cache:/home/appuser/.cache/huggingface
      - model_artifacts:/app/models
    command: celery -A app.tasks worker --loglevel=info --concurrency=${CELERY_GENERATION_CONCURRENCY:-2} -Q generation
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G

  celery-worker-analytics:
    <<: *backend-image
    restart: unless-stopped
    init: true
    environment:
      <<: [*backend-env, *proxy-env]
    depends_on:
      <<: *runtime-depends
    volumes:
      - ./backend:/app
      - hf_cache:/home/appuser/.cache/huggingface
      - model_artifacts:/app/models
    command: celery -A app.tasks worker --loglevel=info --concurrency=${CELERY_ANALYTICS_CONCURRENCY:-2} -Q model,analytics
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 3G

  celery-beat:
    <<: *backend-image
    restart: unless-stopped
    init: true
    environment:
      <<: [*backend-env, *proxy-env]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery beat' >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  flower:
    <<: *backend-image
    restart: unless-stopped
    init: true
    environment:
      <<: [*backend-env, *proxy-env]
    ports:
      - "127.0.0.1:${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks flower --port=5555 --url_prefix=flower
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1', 5555)); s.close()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    <<: *frontend-image
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.30.3-alpine
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M

  prometheus:
    image: prom/prometheus:v3.8.0
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:12.4.0
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # Grafana is published through Nginx under /grafana/.  Keep this URL
      # aligned with the public proxy path so login redirects and assets do
      # not fall back to the Next.js application root.
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost/grafana/}
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards/provider.yml:/etc/grafana/provisioning/dashboards/default.yml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  minio_data:
  sd_models:
  hf_cache:
  model_artifacts:
  prometheus_data:
  grafana_data:
