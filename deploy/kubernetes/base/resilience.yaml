apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: shelook-api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: shelook-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shelook-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shelook-api
  minReplicas: 3
  maxReplicas: 20
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
