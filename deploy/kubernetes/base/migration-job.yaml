apiVersion: batch/v1
kind: Job
metadata:
  name: shelook-migrate-manual
  namespace: shelook
  labels:
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          # Replace with the immutable backend image selected for this release.
          image: registry.example.com/shelook/backend:REPLACE_WITH_RELEASE_TAG
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: shelook-runtime-config
          env:
            - name: DATABASE_MIGRATION_URL
              valueFrom:
                secretKeyRef:
                  name: shelook-migration
                  key: DATABASE_MIGRATION_URL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
