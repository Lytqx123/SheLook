apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelook-worker-orchestration
  labels:
    app.kubernetes.io/name: shelook-worker-orchestration
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: shelook-worker-orchestration
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shelook-worker-orchestration
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: shelook-backend
          command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=4", "-Q", "orchestration"]
          envFrom:
            - configMapRef:
                name: shelook-runtime-config
            - secretRef:
                name: shelook-runtime
          volumeMounts:
            - name: model-artifacts
              mountPath: /app/models
            - name: runtime-tmp
              mountPath: /tmp
          resources:
            requests: { cpu: 300m, memory: 768Mi }
            limits: { cpu: "2", memory: 2Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: shelook-model-artifacts
        - name: runtime-tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelook-worker-generation
  labels:
    app.kubernetes.io/name: shelook-worker-generation
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: shelook-worker-generation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shelook-worker-generation
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: shelook-backend
          command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=2", "-Q", "generation"]
          envFrom:
            - configMapRef:
                name: shelook-runtime-config
            - secretRef:
                name: shelook-runtime
          volumeMounts:
            - name: model-artifacts
              mountPath: /app/models
            - name: runtime-tmp
              mountPath: /tmp
            - name: c2pa-signing
              mountPath: /var/run/secrets/shelook/c2pa
              readOnly: true
          resources:
            requests: { cpu: "1", memory: 2Gi }
            limits: { cpu: "4", memory: 6Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: shelook-model-artifacts
        - name: runtime-tmp
          emptyDir: {}
        - name: c2pa-signing
          secret:
            secretName: shelook-c2pa
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelook-worker-analytics
  labels:
    app.kubernetes.io/name: shelook-worker-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shelook-worker-analytics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shelook-worker-analytics
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: shelook-backend
          command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=2", "-Q", "model,analytics"]
          envFrom:
            - configMapRef:
                name: shelook-runtime-config
            - secretRef:
                name: shelook-runtime
          volumeMounts:
            - name: model-artifacts
              mountPath: /app/models
            - name: runtime-tmp
              mountPath: /tmp
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: "2", memory: 3Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: shelook-model-artifacts
        - name: runtime-tmp
          emptyDir: {}
